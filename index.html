<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Login Page</title>

    <!-- tailwind + daisyUI cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google fonts + font family  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css file  -->
     <link rel="stylesheet" href="./style.css">



     <!-- optional  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

</head>
<body >
    <section class="min-h-screen max-w-md mx-auto m-10 p-10 bg-base-200 grid grid-cols-1 gap-2 shadow-xl rounded-md">
        <div class="text-center ">
            <img class="mx-auto" src="./assets/github-logo.png" alt="github logo">
            <h2 class="text-2xl font-bold">Github Issues Tracker</h2>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>
        <div class="">
            <fieldset class="fieldset  w-full ">
                <!-- <legend class="fieldset-legend">Login</legend> -->
            
                <label class="label font-bold text-base">Username</label>
                <input id="inputUsername" type="text" class="input w-full" placeholder=" Enter your username" />
                <label class="text-blue-400">default: admin</label>
                
                <label class="label font-bold text-base">Password</label>
                <input id="inputPassword" type="password" class="input w-full"  placeholder="Enter your password" />
                <label class="text-blue-400">default: admin123</label>
            
                <button id="loginBtn" class="btn btn-primary mt-4">Login</button>
            
            </fieldset>
        </div>
        <div class="relative border-t border-gray-300 w-full text-center my-6">
            <span class="absolute left-1/2 -translate-x-1/2 -top-3 bg-white px-3 text-gray-500">
                OR
            </span>
            <div class="text-center pt-4">
                <h2 class="text-gray-500 mb-4">Demo credentials:</h2>
                <p><span class="font-medium">Username:</span> admin</p>
                <p><span class="font-medium">Password:</span> admin123</p>
            </div>
        </div>
    </section>

    <script src="./javacript/script.js"></script>
</body>
</html>
