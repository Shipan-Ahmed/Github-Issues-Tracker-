<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Home page</title>

    <!-- tailwind + daisyUI cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- google fonts + font family  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- css file  -->
    <link rel="stylesheet" href="./style.css">
    
    
    
    <!-- optional  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-[#F8FAFC]">

    <!-- header section  -->
    <header class= " border-b-2 border-gray-300 bg-white ">
        <nav class="ml-10 mr-10 mt-1 mb-1 p-4 flex justify-between items-center  ">
            <div class="flex justify-between items-center  gap-1 ">
                <img class="mx-auto w-[50px] h-[50px]" src="./assets/github-logo.png" alt="github logo" >
                <h2 class="text-2xl font-bold">Github Issues Tracker</h2>
            </div>
            <!-- <div> -->
                <div class="join">
                    <div>
                        <label class="input validator join-item">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </g>
                            </svg>
                            <input id="input" type="text" placeholder=" Search issues..." required />
                        </label>
                        <!-- <div class="validator-hint hidden">Enter valid email address</div> -->
                    </div>
                    <button id="searchBtn" class="btn btn-primary join-item"><i class="fa-solid fa-plus"></i> New Issues</button>
                </div>

            <!-- </div> -->
        </nav>
    </header>


    <!-- button section  -->
    <section class="mt-20 w-[85%] p-4 mx-auto bg-white flex justify-start items-center gap-4  shadow rounded">
        <button class="tabBtn px-6 py-2 rounded-md text-white cursor-pointer bg-blue-700" data-tab="all">All </button>
        <button class="tabBtn px-6 py-2 rounded-md cursor-pointer text-black bg-gray-200" data-tab="open">Open </button>
        <button class="tabBtn px-6 py-2 rounded-md cursor-pointer text-black bg-gray-200"  data-tab="closed">Closed </button>

    </section>

    <!-- loading spinner  -->
    <section id="spinner"
        class="w-[85%] mx-auto bg-white shadow flex justify-center items-center p-4 mt-10 mb-10 rounded hidden">
        <span class="loading loading-bars loading-lg"></span>
    </section>


    <!-- Deshborad  -->

    <section class=" mt-10 w-[85%] mx-auto bg-white flex gap-2 shadow mb-[2px] rounded p-4">
        <div class="flex gap-2 flex-2">
            <div class="bg-gray-200 p-3 rounded-full">
                <img class="mx-auto" src="./assets/Aperture.png" alt="Aperture Logo">
            </div>
            <div>
                <h2 class="text-2xl font-bold space-x-1"><span id="issues">0</span><span>Issues</span></h2>
                <p class="text-gray-600">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 flex-1 justify-end items-center">
            <div class="flex gap-2 justify-center items-center">
              
                <p class="w-3 h-3 bg-green-700 rounded-full"></p>
                <p>Open</p>
            </div>
            <div class="flex gap-2 justify-center items-center">
                <!-- <img class="w-6 h-6 mx-auto" src="./assets/Closed- Status .png" alt="Closed Status Logo"> -->
                 <p class="w-3 h-3 bg-purple-700 rounded-full"></p>
                <p>Closed</p>
            </div>
        </div>
    </section>


    

    <!-- card container -->

     <section id="cardContainer" class="  w-[85%] mx-auto bg-white shadow grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 space-x-4 space-y-4  p-8">
            <!-- card  -->
       
     </section>



    <script src="./javacript/functional.js"></script>
</body>
</html>
